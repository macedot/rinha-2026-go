x-api-common: &api-common
  build: .
  volumes:
    - rinha-go-sockets:/sockets
  networks:
    - rinha-go-net
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  deploy:
    resources:
      limits:
        cpus: "0.425"
        memory: "150M"
  environment: &api-env
    INDEX_PATH: "/app/resources/index.bin"
    MCC_RISK_PATH: "/app/resources/mcc_risk.json"
    LISTEN_TCP: "0"
    UDS_MODE: "666"
    UNLINK_UDS: "1"
    IVF_NPROBE: "8"
    IVF_FULL_NPROBE: "24"
    CANDIDATES: "0"
    AMOUNT_DIVISOR: "10000"
    INSTALLMENTS_DIVISOR: "12"
    TX24H_DIVISOR: "20"
    KM_DIVISOR: "1000"
    MERCHANT_AMOUNT_DIVISOR: "10000"
    GOGC: "100"
    GOMEMLIMIT: "100MiB"
  healthcheck:
    test: ["CMD-SHELL", "test -S $$UDS_PATH"]
    interval: 1s
    timeout: 1s
    retries: 30
    start_period: 5s

services:
  passa:
    image: ghcr.io/macedot/passa:latest
    container_name: rinha-go-passa
    ports:
      - "9999:9999"
    volumes:
      - rinha-go-sockets:/sockets
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    networks:
      - rinha-go-net
    security_opt:
      - seccomp:unconfined
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "50M"
    environment:
      PORT: "9999"
      BUF_SIZE: "4096"
      UPSTREAMS: "/sockets/api1.sock,/sockets/api2.sock"

  api1:
    <<: *api-common
    container_name: rinha-go-api1
    hostname: api1
    environment:
      <<: *api-env
      UDS_PATH: "/sockets/api1.sock"

  api2:
    <<: *api-common
    container_name: rinha-go-api2
    hostname: api2
    environment:
      <<: *api-env
      UDS_PATH: "/sockets/api2.sock"

networks:
  rinha-go-net:
    driver: bridge

volumes:
  rinha-go-sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=10m
